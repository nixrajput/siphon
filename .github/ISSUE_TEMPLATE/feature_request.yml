name: Feature request
description: Suggest a capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that siphon makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like siphon to do. A command sketch helps.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backup / restore
        - Sync / CDC / cross-engine
        - Storage backends
        - Retention
        - Secrets / auth / audit
        - TUI
        - Drivers (new engine)
        - Other
    validations:
      required: true
